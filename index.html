<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>trustlix.org</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #aaa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    img {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      margin-bottom: 1.5rem;
      opacity: 0.9;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 400;
      color: #e8e8e8;
      letter-spacing: 0.03em;
      margin-bottom: 1.5rem;
    }

    nav {
      display: flex;
      gap: 2rem;
      justify-content: center;
    }

    nav a {
      color: #666;
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #e8e8e8;
    }
  </style>
</head>
<body>
  <main>
    <img src="/avatar.jpg" alt="Alex Zanetti de Lima">
    <h1>Alex Zanetti de Lima</h1>
    <nav>
      <a href="https://github.com/trustlix">GitHub</a>
      <a href="https://br.linkedin.com/in/trustlix">LinkedIn</a>
    </nav>
  </main>
</body>
</html>
